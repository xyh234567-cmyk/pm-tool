# SQLite 表结构契约 · 机器照搬
# 与 01-架构设计.md §5 的 schema.sql 一致;冲突以本文件为准。
# 约定:日期一律 'YYYY-MM-DD' 文本存;金额/百分比 REAL 存原值不换算;空值 NULL。

tables:

  snapshot:                       # 一行 = 某业务在某快照日期的基本信息+合同经营
    primary_key: [biz_id, snap_date]
    columns:
      biz_id:              {type: TEXT, nullable: false}
      snap_date:           {type: TEXT, nullable: false}   # YYYY-MM-DD,来自文件名
      project_name:        {type: TEXT}
      biz_type:            {type: TEXT}
      stage_status:        {type: TEXT}
      customer:            {type: TEXT}
      customer_industry:   {type: TEXT}
      description:         {type: TEXT}
      deliverables:        {type: TEXT}
      setup_date:          {type: TEXT}
      plan_deliver_date:   {type: TEXT}
      actual_deliver_date: {type: TEXT}
      progress_pct:        {type: REAL}
      risk_level:          {type: TEXT}
      risk_desc:           {type: TEXT}
      current_issue:       {type: TEXT}
      contract_status:     {type: TEXT}
      contract_no:         {type: TEXT}
      contract_amount:     {type: REAL}
      invoiced_amount:     {type: REAL}
      received_amount:     {type: REAL}
      gross_margin_pct:    {type: REAL}
      owner_name:          {type: TEXT}
      pm_name:             {type: TEXT}
      last_update_date:    {type: TEXT}
      form_status:         {type: TEXT}
      source_filename:     {type: TEXT}
      ingested_at:         {type: TEXT}

  snapshot_member:                # 一行 = 某快照里某人一行
    primary_key: [biz_id, snap_date, row_idx]
    columns:
      biz_id:        {type: TEXT, nullable: false}
      snap_date:     {type: TEXT, nullable: false}
      row_idx:       {type: INTEGER, nullable: false}     # 原表行号
      name:          {type: TEXT}
      emp_id:        {type: TEXT}
      role:          {type: TEXT}
      task_desc:     {type: TEXT}
      join_start:    {type: TEXT}
      join_end:      {type: TEXT}
      workload_pct:  {type: REAL}
      progress_note: {type: TEXT}
      eval:          {type: TEXT}
      note:          {type: TEXT}
      is_external:   {type: INTEGER, default: 0}            # 1=外协/非真实人员

  snapshot_task:                  # 一行 = 某快照里一个阶段或子任务
    primary_key: [biz_id, snap_date, row_idx]
    columns:
      biz_id:       {type: TEXT, nullable: false}
      snap_date:    {type: TEXT, nullable: false}
      row_idx:      {type: INTEGER, nullable: false}
      seq:          {type: TEXT}                            # 原表"#",可重复
      task_name:    {type: TEXT}
      owner:        {type: TEXT}
      plan_start:   {type: TEXT}
      plan_end:     {type: TEXT}
      actual_start: {type: TEXT}
      progress_pct: {type: REAL}
      status:       {type: TEXT}
      note:         {type: TEXT}

  qc_issue:                       # 一行 = 一条质检告警
    primary_key: [rowid]          # 自增
    columns:
      biz_id:          {type: TEXT}      # 可能解析不出,允许空
      snap_date:       {type: TEXT}
      source_filename: {type: TEXT}
      severity:        {type: TEXT}      # error / warning
      issue_type:      {type: TEXT}
      location:        {type: TEXT}
      message:         {type: TEXT}
      detected_at:     {type: TEXT}

  scan_run:                       # 一行 = 一次扫描批次
    primary_key: [run_id]
    columns:
      run_id:      {type: INTEGER, autoincrement: true}
      started_at:  {type: TEXT}
      finished_at: {type: TEXT}
      files_total: {type: INTEGER}
      inserted:    {type: INTEGER}
      updated:     {type: INTEGER}
      skipped:     {type: INTEGER}
      qc_errors:   {type: INTEGER}
      qc_warnings: {type: INTEGER}

indexes:
  - {table: snapshot,        name: idx_snapshot_latest, columns: [biz_id, snap_date]}
  - {table: snapshot_member, name: idx_member_person,   columns: [name, snap_date]}
  - {table: snapshot_task,   name: idx_task_proj,       columns: [biz_id, snap_date]}

# 最新快照取数:每个 biz_id 取 MAX(snap_date) 的主表行及其子表
latest_snapshot_rule: "GROUP BY biz_id, MAX(snap_date)"
