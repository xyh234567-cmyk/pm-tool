# Excel 模板解析契约 · 机器照搬(整个工具的地基)
# 与 02-数据模型与Excel解析规格.md 一致;冲突以本文件为准。
# 核心策略:区块锚点 + 标签匹配定位,不写死行号列号。

sheet:
  primary: 业务填写表
  fallback: first            # 找不到则取首个 sheet + SHEET_MISSING warning
  ignore: [字典参考]
  data_only: true            # 读计算值

# 在 A 列扫描包含以下文字的行,作为区块锚点
section_anchors:
  basic: 一、业务基本信息
  contract: 二、合同与经营信息
  members: 三、人员分工
  tasks: 四、阶段

# 标签归一规则(匹配前先做):去首尾空白、去全角空格、去 ★、去末尾括注 (元)/(员工ID) 等
label_normalize:
  strip_chars: ['★', ' ', '　']
  strip_paren_suffix: true

# === 区块一/二:键值对 → snapshot 列 ===
# 取值:标签单元格向右第一个非空单元格;找不到标签或值空 → NULL(不报错)
key_value_fields:
  业务ID:            {column: biz_id,            type: text,   required: true}
  业务类型:          {column: biz_type,          type: text}
  当前阶段/状态:     {column: stage_status,      type: text,   required: true}
  业务名称:          {column: project_name,      type: text,   required: true}
  客户名称:          {column: customer,          type: text}
  客户行业:          {column: customer_industry, type: text}
  业务描述/一句话说明: {column: description,      type: text}
  关键任务/交付内容: {column: deliverables,      type: text}
  立项日期:          {column: setup_date,        type: date}
  计划交付日期:      {column: plan_deliver_date, type: date}
  实际交付日期:      {column: actual_deliver_date, type: date}
  完成度%:           {column: progress_pct,      type: number, required: true}
  风险等级:          {column: risk_level,        type: text}
  风险描述/难点:     {column: risk_desc,         type: text}
  当前主要问题:      {column: current_issue,     type: text}
  合同状态:          {column: contract_status,   type: text}
  合同编号:          {column: contract_no,       type: text}
  合同金额:          {column: contract_amount,   type: number}
  已开票金额:        {column: invoiced_amount,   type: number}
  已回款金额:        {column: received_amount,   type: number}
  毛利率%估算:       {column: gross_margin_pct,  type: number}
  项目总负责人:      {column: owner_name,        type: text}
  项目经理:          {column: pm_name,           type: text}
  最后更新日期:      {column: last_update_date,  type: date}
  表单状态:          {column: form_status,       type: text}
# 不入库:客户联系人、备注

# === 区块三:人员分工(表头 + 多行)→ snapshot_member ===
members:
  header_detect: [姓名, 投入工作量]     # 同一行同时含 → 表头行
  column_map:                           # 表头列名(包含匹配) → 目标字段
    姓名: name
    员工ID: emp_id
    角色: role
    具体负责任务: task_desc
    参与开始: join_start                # date
    参与结束: join_end                  # date
    投入工作量%: workload_pct           # number
    当前完成情况: progress_note
    上级评价: eval
    备注: note
  row_index_field: row_idx              # 用原表行号
  stop_on: [empty_row, next_anchor]
  external_check_field: name            # 命中 external_member_names → is_external=1
  multi_name_warn: true                 # name 含分隔符 → 保留原值 + MULTI_NAME_IN_MEMBER

# === 区块四:阶段/任务(表头 + 多行)→ snapshot_task ===
tasks:
  header_detect: ['#', 计划开始]
  column_map:
    '#': seq                            # text,可重复
    阶段/任务名称: task_name
    负责人: owner                       # 可能是"外协"或多名字,原样存
    计划开始: plan_start                # date
    计划结束: plan_end                  # date
    实际开始: actual_start              # date
    完成度%: progress_pct               # number
    状态: status
    备注: note
  row_index_field: row_idx
  skip_if_empty: task_name              # task_name 空则跳过该行(尾部空壳行)
  stop_on: [empty_row, eof]

# === 类型转换 ===
type_rules:
  date:
    output_format: '%Y-%m-%d'
    accept: [datetime, 'YYYY-MM-DD', 'YYYY/M/D']
    on_fail: {value: null, qc: BAD_DATE}
  number:
    strip: ['%', ' ']
    on_fail: {value: null, qc: BAD_NUMBER}
  text:
    strip: true
    empty_as_null: true

# === 主键与快照日期口径 ===
identity:
  primary_key_source: cell              # 业务ID 以表内单元格为权威
  snapshot_date_source: filename        # 快照日期取文件名【YYYYMMDD】
  snapshot_date_fallback: file_mtime    # 文件名无日期 → 回退文件修改日期 + FILENAME_FORMAT
  on_id_mismatch: {prefer: cell, qc: ID_FILENAME_MISMATCH}
  on_dup_same_id_date: {keep: latest_mtime, qc: DUP_SNAPSHOT_FILE}
