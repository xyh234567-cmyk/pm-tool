<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}项目管理工具{% endblock %}</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['SF Pro Display', 'Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
          text: ['SF Pro Text', 'Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
        },
        colors: {
          ink: '#1d1d1f',
          graphite: '#707070',
          slate: '#474747',
          ash: '#333333',
          fog: '#f5f5f7',
          snow: '#ffffff',
          obsidian: '#000000',
          'silver-mist': '#e8e8ed',
          azure: '#0071e3',
          'cobalt-link': '#0066cc',
          caution: '#b64400',
        },
        borderRadius: {
          'card': '28px',
          'pill': '999px',
          'nav': '980px',
          'feature': '28px',
          'sm-btn': '10px',
          'rounded-btn': '36px',
        },
      }
    }
  }
</script>
<link rel="stylesheet" href="/static/app.css">
{% block head %}{% endblock %}
</head>
<body>
<header class="sticky top-0 z-50 bg-snow border-b border-silver-mist h-[52px] flex items-center px-6">
  <div class="flex items-center gap-6 flex-1">
    <a href="/" class="font-semibold text-[17px] text-ink no-underline tracking-[-0.006em]">项目管理 · 全局监控</a>
    <nav class="flex gap-6 text-[14px]">
      <a href="/" class="nav-link {{ 'active' if request.url.path == '/' else '' }}">总览</a>
      <a href="/delay" class="nav-link {{ 'active' if request.url.path == '/delay' else '' }}">延期预警</a>
      <a href="/resource" class="nav-link {{ 'active' if request.url.path == '/resource' else '' }}">资源撞车</a>
      <a href="/qc" class="nav-link {{ 'active' if request.url.path == '/qc' else '' }}">数据质检</a>
    </nav>
  </div>
  <div class="flex items-center gap-4 text-[12px] text-graphite tracking-[-0.003em]">
    {% if scan_run %}
    <span>最近扫描 {{ scan_run.get('finished_at','')[:10] }}</span>
    {% endif %}
    <form method="post" action="/scan" class="m-0">
      <button type="submit" class="btn-primary">扫描 NAS</button>
    </form>
  </div>
</header>

{% if request.query_params.get('msg') %}
<div class="bg-azure text-snow text-center py-3 text-[14px] font-text">{{ request.query_params.msg }}</div>
{% endif %}

<main class="max-w-[1200px] mx-auto px-6 py-8">
{% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
