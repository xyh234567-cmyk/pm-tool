<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}项目管理工具{% endblock %}</title>
<link rel="stylesheet" href="/static/app.css">
{% block head %}{% endblock %}
</head>
<body class="bg-[#f5f5f7] text-[#1d1d1f] font-sans">
<header class="sticky top-0 z-50 bg-white border-b border-[#e8e8ed] h-[52px] flex items-center px-6">
  <div class="flex items-center gap-6 flex-1">
    <a href="/" class="font-semibold text-[17px] text-[#1d1d1f] no-underline">项目管理 · 全局监控</a>
    <nav class="flex gap-4 text-[14px]">
      <a href="/" class="nav-link {{ 'active' if request.url.path == '/' else '' }}">总览</a>
      <a href="/delay" class="nav-link {{ 'active' if request.url.path == '/delay' else '' }}">延期预警</a>
      <a href="/resource" class="nav-link {{ 'active' if request.url.path == '/resource' else '' }}">资源撞车</a>
      <a href="/qc" class="nav-link {{ 'active' if request.url.path == '/qc' else '' }}">数据质检</a>
    </nav>
  </div>
  <div class="flex items-center gap-4 text-[12px] text-[#707070]">
    {% if scan_run %}
    <span>最近扫描 {{ scan_run.get('finished_at','')[:10] }}</span>
    {% endif %}
    <form method="post" action="/scan" class="m-0">
      <button type="submit" class="bg-[#0071e3] text-white border-none rounded-full px-4 py-2 text-[14px] cursor-pointer">扫描 NAS</button>
    </form>
  </div>
</header>

{% if request.query_params.get('msg') %}
<div class="bg-[#0071e3] text-white text-center py-3 text-[14px]">{{ request.query_params.msg }}</div>
{% endif %}

<main class="max-w-[1200px] mx-auto px-6 py-8">
{% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
